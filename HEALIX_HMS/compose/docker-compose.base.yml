version: '3.8'

# Common configuration for all HMS services
x-hms-service: &hms-service
  networks:
    - hms_network
  depends_on:
    - mongo

services:
  # Infrastructure
  mongo:
    image: mongo:latest
    container_name: hms_mongo
    networks:
      - hms_network
    volumes:
      - mongodb_data:/data/db

  # API Gateway
  api_gateway:
    <<: *hms-service
    build: 
      context: ../api_gateway
    container_name: hms_gateway
    depends_on:
      - mongo
      - auth_service

  # Microservices (Dynamically scalable)
  auth_service:
    <<: *hms-service
    build: ../services/auth_service
    container_name: hms_auth

  patient_service:
    <<: *hms-service
    build: ../services/patient_service
    container_name: hms_patient

  doctor_service:
    <<: *hms-service
    build: ../services/doctor_service
    container_name: hms_doctor

  appointment_service:
    <<: *hms-service
    build: ../services/appointment_service
    container_name: hms_appointment

  billing_service:
    <<: *hms-service
    build: ../services/billing_service
    container_name: hms_billing

  pharmacy_service:
    <<: *hms-service
    build: ../services/pharmacy_service
    container_name: hms_pharmacy

  lab_service:
    <<: *hms-service
    build: ../services/lab_service
    container_name: hms_lab

  ward_service:
    <<: *hms-service
    build: ../services/ward_service
    container_name: hms_ward

  emergency_service:
    <<: *hms-service
    build: ../services/emergency_service
    container_name: hms_emergency

  ambulance_service:
    <<: *hms-service
    build: ../services/ambulance_service
    container_name: hms_ambulance

  hr_service:
    <<: *hms-service
    build: ../services/hr_service
    container_name: hms_hr

  maintenance_service:
    <<: *hms-service
    build: ../services/maintenance_service
    container_name: hms_maintenance

  radiology_service:
    <<: *hms-service
    build: ../services/radiology_service
    container_name: hms_radiology

  notification_service:
    <<: *hms-service
    build: ../services/notification_service
    container_name: hms_notification

  analytics_service:
    <<: *hms-service
    build: ../services/analytics_service
    container_name: hms_analytics

  # Frontend
  frontend:
    build: ../frontend
    container_name: hms_frontend
    depends_on:
      - api_gateway
    networks:
      - hms_network

networks:
  hms_network:
    driver: bridge

volumes:
  mongodb_data:
