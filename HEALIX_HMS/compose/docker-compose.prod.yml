version: '3.8'

# Global production policies
x-prod-config: &prod-config
  restart: always
  deploy:
    resources:
      limits:
        cpus: '0.25'
        memory: 256M
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

# Common healthcheck for FastAPI services
x-hms-health: &hms-health
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 30s
    timeout: 10s
    retries: 3

services:
  mongo:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api_gateway:
    <<: [*prod-config, *hms-health]

  auth_service:
    <<: [*prod-config, *hms-health]

  patient_service:
    <<: [*prod-config, *hms-health]

  doctor_service:
    <<: [*prod-config, *hms-health]

  appointment_service:
    <<: [*prod-config, *hms-health]

  billing_service:
    <<: [*prod-config, *hms-health]

  pharmacy_service:
    <<: [*prod-config, *hms-health]

  lab_service:
    <<: [*prod-config, *hms-health]

  ward_service:
    <<: [*prod-config, *hms-health]

  emergency_service:
    <<: [*prod-config, *hms-health]

  ambulance_service:
    <<: [*prod-config, *hms-health]

  hr_service:
    <<: [*prod-config, *hms-health]

  maintenance_service:
    <<: [*prod-config, *hms-health]

  radiology_service:
    <<: [*prod-config, *hms-health]

  notification_service:
    <<: [*prod-config, *hms-health]

  analytics_service:
    <<: [*prod-config, *hms-health]

  frontend:
    <<: *prod-config
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
