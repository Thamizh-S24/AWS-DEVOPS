<style>
    /* Base Glass Card */
    .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }
    
    /* Premium Section Styles */
    .premium-hero {
        background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(243,244,246,0.85) 100%);
        border: 2px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 20px 40px rgba(79, 70, 229, 0.1);
    }
    
    .premium-analytics {
        background: rgba(255, 255, 255, 0.85);
        border: 2px solid rgba(99, 102, 241, 0.2);
        box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.5), 0 10px 30px rgba(0, 0, 0, 0.05);
    }
    
    .premium-focus {
        background: linear-gradient(to right bottom, rgba(255,255,255,0.9), rgba(238,242,255,0.7));
        border: 2px solid rgba(167, 139, 250, 0.3);
        box-shadow: inset 0 0 20px rgba(255,255,255,0.8), 0 10px 30px rgba(0,0,0,0.06);
    }

    .premium-ai {
        background: linear-gradient(145deg, rgba(147,51,234,0.03) 0%, rgba(79,70,229,0.05) 100%);
        border: 2px solid rgba(99, 102, 241, 0.4);
        box-shadow: 0 15px 35px rgba(99, 102, 241, 0.15);
    }
    
    .premium-trophy {
        background: linear-gradient(135deg, rgba(255,251,235,0.9) 0%, rgba(254,243,199,0.7) 100%);
        border: 2px solid rgba(251, 191, 36, 0.5);
        box-shadow: 0 15px 35px rgba(245, 158, 11, 0.15);
        position: relative;
    }
    .premium-trophy::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
        opacity: 0.3;
        z-index: 0;
        pointer-events: none;
    }

    .premium-alerts {
        background: rgba(255, 255, 255, 0.9);
        border: 2px solid rgba(226, 232, 240, 0.8);
        border-left: 6px solid rgba(239, 68, 68, 0.6);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
    }

    .premium-community {
        background: linear-gradient(to bottom, rgba(255,255,255,0.95), rgba(224,242,254,0.4));
        border: 2px solid rgba(56, 189, 248, 0.3);
        box-shadow: 0 10px 25px rgba(2, 132, 199, 0.08);
    }

    /* Animations */
    .orb-slow { animation: float-slow 15s ease-in-out infinite; }
    .orb-fast { animation: float-fast 10s ease-in-out infinite; }
    @keyframes float-slow {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-40px) scale(1.05); }
    }
    @keyframes float-fast {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(-20px, 30px) scale(1.1); }
    }
</style>
