{% extends 'base.html' %}
{% block title %}New Ticket - Support Hub{% endblock %}
{% block page_title %}Submit Ticket{% endblock %}

{% block content %}
<div class="p-6 max-w-4xl mx-auto space-y-6">
    <!-- Back Link -->
    <a href="{% url 'support:ticket_list' %}" class="inline-flex items-center gap-2 text-sm font-bold text-indigo-600 hover:text-indigo-800 transition-colors">
        <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Support Hub
    </a>

    <div class="bg-white rounded-3xl border border-gray-100 shadow-xl overflow-hidden p-10">
        <div class="mb-8 text-center md:text-left">
            <h2 class="text-3xl font-black text-gray-900 italic tracking-tight italic">How can we help? 🛎️</h2>
            <p class="text-gray-400 font-medium mt-1 uppercase tracking-widest text-[10px]">Submit a ticket and our team will get back to you shortly.</p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Category Selection -->
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 italic">Category *</label>
                    <select name="category" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 cursor-pointer appearance-none">
                        <option value="TECH">Technical Issue</option>
                        <option value="CONTENT">Course Content Question</option>
                        <option value="ACCOUNT">Account/Billing</option>
                        <option value="OTHER" selected>Other</option>
                    </select>
                </div>

                <!-- Priority Selection -->
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 italic">Priority *</label>
                    <select name="priority" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 cursor-pointer appearance-none">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM" selected>Medium</option>
                        <option value="HIGH">High</option>
                        <option value="URGENT">Urgent</option>
                    </select>
                </div>
            </div>

            <!-- Ticket Subject -->
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 italic">Subject *</label>
                <input type="text" name="subject" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 placeholder:text-gray-300" placeholder="Briefly describe the issue">
            </div>

            <!-- Ticket Description -->
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 italic">Detailed Description *</label>
                <textarea name="description" rows="8" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-medium outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 placeholder:text-gray-300 transition-all" placeholder="Provide as much detail as possible to help us resolve the issue swiftly..."></textarea>
            </div>

            <!-- Submit -->
            <div class="pt-4">
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white font-black rounded-3xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all transform hover:-translate-y-1 active:scale-95 text-lg italic">
                    Submit Ticket ✨
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
