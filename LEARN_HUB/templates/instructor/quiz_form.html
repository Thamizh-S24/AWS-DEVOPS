{% extends 'base.html' %}
{% block title %}Create Quiz - Instructor{% endblock %}
{% block page_title %}Assessment Builder{% endblock %}

{% block content %}
<div class="p-6 max-w-2xl mx-auto space-y-6">
    <div class="flex items-center gap-4 mb-6">
        <a href="{% url 'instructor:quizzes' %}" class="w-10 h-10 bg-gray-100 text-gray-500 rounded-full flex items-center justify-center hover:bg-gray-200 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
        <div>
            <h2 class="text-2xl font-black text-gray-900">Create Manual Quiz</h2>
            <p class="text-gray-500 text-sm mt-1">Start by defining the quiz structure, then add questions.</p>
        </div>
    </div>

    <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Quiz Title *</label>
                <input type="text" name="title" required placeholder="e.g. Advanced JavaScript Patterns" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 focus:bg-white transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Description</label>
                <textarea name="description" rows="3" placeholder="Briefly explain what this quiz covers..." class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 focus:bg-white transition-all resize-none"></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Select Course *</label>
                    <select name="course_id" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none appearance-none cursor-pointer focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400">
                        <option value="" disabled selected>-- Select Course --</option>
                        {% for course in courses %}
                        <option value="{{ course.pk }}">{{ course.title }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Passing Score (%)</label>
                    <input type="number" name="passing_score" value="70" min="0" max="100" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">Initial Status</label>
                <select name="status" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none appearance-none cursor-pointer focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400">
                    {% for val, label in status_choices %}
                    <option value="{{ val }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="pt-6">
                <button type="submit" class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all flex items-center justify-center gap-3">
                    Continue to Add Questions <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
