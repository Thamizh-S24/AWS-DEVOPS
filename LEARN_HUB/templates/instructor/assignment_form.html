{% extends 'base.html' %}
{% block title %}New Assignment{% endblock %}
{% block page_title %}Assignment Builder{% endblock %}

{% block content %}
<div class="p-6 max-w-2xl mx-auto">
    <div class="mb-8">
        <h2 class="text-3xl font-black text-gray-900 italic">Create Assignment 📝</h2>
        <p class="text-gray-500 font-medium">Define student tasks and submission deadlines.</p>
    </div>

    <form method="post" class="bg-white rounded-3xl border border-gray-100 shadow-xl p-8 space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 italic">Assignment Title *</label>
            <input type="text" name="title" required placeholder="e.g. React Final Project" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 focus:bg-white transition-all">
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 italic">Instructions</label>
            <textarea name="description" rows="5" placeholder="Detail the task and requirements..." class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 focus:bg-white transition-all resize-none"></textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 italic">Due Date *</label>
                <input type="datetime-local" name="due_date" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 focus:bg-white transition-all">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 italic">Max Points</label>
                <input type="number" name="max_points" value="100" class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400 focus:bg-white transition-all">
            </div>
        </div>

        <div>
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-3 italic">Target Course *</label>
            <select name="course_id" required class="w-full px-5 py-4 bg-gray-50 border border-gray-100 rounded-2xl text-sm font-bold outline-none appearance-none cursor-pointer focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-400">
                <option value="" disabled selected>-- Select Course --</option>
                {% for course in courses %}
                <option value="{{ course.pk }}">{{ course.title }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="pt-6">
            <button type="submit" class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Publish Assignment</button>
        </div>
    </form>
</div>
{% endblock %}
